<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>文字雲留言</title>
  <style>
    :root {
      --bg:      #07192e;
      --bg2:     #0d2645;
      --panel:   #0a1f38;
      --accent:  #4a9eff;
      --accent2: #1a6fd4;
      --text:    #d0e8ff;
      --border:  #1a3a5c;
      --muted:   #4a7a9b;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100dvh;
      background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      font-family: 'Segoe UI', 'Microsoft JhengHei', Arial, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: calc(var(--safe-top) + 24px) 20px calc(var(--safe-bottom) + 24px);
    }

    .card {
      background: rgba(10,31,56,.85);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 26px 28px;
      width: 100%; max-width: 440px;
      box-shadow: 0 24px 60px rgba(0,0,0,.45);
    }

    /* Header */
    .header { text-align: center; margin-bottom: 28px; }
    .header .icon {
      font-size: 2.4rem; line-height: 1;
      display: block; margin-bottom: 8px;
    }
    .header h1 {
      font-size: clamp(1.3rem, 5vw, 1.6rem);
      font-weight: 700; color: #fff;
    }
    .header p {
      color: var(--muted);
      font-size: clamp(.82rem, 3.5vw, .92rem);
      margin-top: 5px;
    }

    /* Input */
    input[type="text"] {
      width: 100%;
      padding: 15px 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: #fff;
      font-size: clamp(1rem, 4vw, 1.1rem);
      outline: none;
      transition: border-color .18s;
      -webkit-appearance: none;
      margin-bottom: 14px;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--accent); }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--accent2);
      color: #fff; border: none; border-radius: 12px;
      font-size: clamp(1rem, 4.5vw, 1.1rem); font-weight: 700;
      cursor: pointer; transition: background .15s, transform .12s;
      min-height: 54px; letter-spacing: .02em;
    }
    .btn-submit:not(:disabled):active {
      background: #1558b0; transform: scale(.98);
    }
    .btn-submit:disabled { opacity: .38; cursor: default; }

    /* Status */
    #status {
      margin-top: 14px; min-height: 22px;
      font-size: clamp(.82rem, 3.5vw, .9rem);
      text-align: center; color: var(--muted);
    }
    .success { color: #4ecf8a !important; font-weight: 600; }
    .error   { color: #ff7070 !important; }

    @media (min-width: 480px) {
      .card { padding: 40px 36px 34px; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <span class="icon">☁</span>
    <h1>分享你的想法</h1>
    <p>輸入一個詞語，加入文字雲！</p>
  </div>

  <input
    type="text"
    id="wordInput"
    placeholder="輸入詞語…"
    maxlength="20"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="none"
    spellcheck="false"
    enterkeyhint="send"
  />

  <button class="btn-submit" id="submitBtn" onclick="submitWord()">
    送出到文字雲 🚀
  </button>
  <p id="status"></p>
</div>

<script type="module">
  import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, get, set, onValue }
                             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyDCx6xPdDT4xMTHsfeU_0B_1b8-vUVM42I",
    authDomain:        "wordcloud-e0a71.firebaseapp.com",
    databaseURL:       "https://wordcloud-e0a71-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "wordcloud-e0a71",
    storageBucket:     "wordcloud-e0a71.firebasestorage.app",
    messagingSenderId: "825747699881",
    appId:             "1:825747699881:web:d47986c54e28135a56d1b8"
  };

  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getDatabase(app);

  // ── 取得或產生裝置 UUID ────────────────────────────────
  function getUUID() {
    let id = localStorage.getItem("voterUUID");
    if (!id) {
      id = crypto.randomUUID
        ? crypto.randomUUID()
        : "id-" + Date.now() + "-" + Math.random().toString(36).slice(2);
      localStorage.setItem("voterUUID", id);
    }
    return id;
  }
  const uuid = getUUID();

  const inp = document.getElementById("wordInput");
  const btn = document.getElementById("submitBtn");
  const st  = document.getElementById("status");

  let maxVotes = 1;   // 預設，會被 Firebase 即時覆蓋
  let sending  = false;

  // ── 即時監聽教師設定的回答次數上限 ─────────────────────
  onValue(ref(db, "settings/maxVotes"), snap => {
    maxVotes = snap.exists() ? snap.val() : 1;
    checkQuota();  // 設定變更時重新檢查狀態
  });

  // ── 即時監聽本人已回答次數 ──────────────────────────────
  onValue(ref(db, `voters/${uuid}`), snap => {
    checkQuota(snap.exists() ? snap.val() : 0);
  });

  function checkQuota(usedCount) {
    if (usedCount === undefined) return;   // 等待資料

    if (maxVotes === 0) {
      // 不限次數
      setBlocked(false, "");
      return;
    }
    const remaining = maxVotes - usedCount;
    if (remaining <= 0) {
      setBlocked(true, `✅ 你已完成全部 ${maxVotes} 次回答，感謝參與！`);
    } else {
      setBlocked(false, remaining < maxVotes
        ? `還可以回答 ${remaining} 次`
        : "");
    }
  }

  function setBlocked(blocked, msg) {
    btn.disabled = blocked || sending;
    inp.disabled = blocked;
    if (blocked) {
      st.className   = "success";
      st.textContent = msg;
    } else {
      if (msg) { st.className = ""; st.textContent = msg; }
      else if (!sending) { st.className = ""; st.textContent = ""; }
    }
  }

  // ── 送出 ───────────────────────────────────────────────
  window.submitWord = async function() {
    const text = inp.value.trim();
    if (!text || sending || inp.disabled) return;

    sending = true;
    btn.disabled = true;
    st.className = "";
    st.textContent = "送出中…";

    try {
      // 再次確認次數（防止快速連點）
      const voterSnap = await get(ref(db, `voters/${uuid}`));
      const used = voterSnap.exists() ? voterSnap.val() : 0;

      if (maxVotes !== 0 && used >= maxVotes) {
        st.className  = "success";
        st.textContent = `✅ 你已完成全部 ${maxVotes} 次回答！`;
        return;
      }

      // 寫入詞語 + 更新計數
      await Promise.all([
        push(ref(db, "words"), { text, time: Date.now() }),
        set(ref(db, `voters/${uuid}`), used + 1),
      ]);

      st.className  = "success";
      st.textContent = `✅「${text}」已送出！`;
      inp.value = "";
      inp.focus();
    } catch(e) {
      st.className  = "error";
      st.textContent = "❌ 送出失敗，請確認網路連線";
      console.error(e);
    } finally {
      sending = false;
      // checkQuota 會由 onValue 自動觸發更新按鈕狀態
    }
  };

  inp.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); window.submitWord(); }
  });

  inp.focus();
</script>
</body>
</html>
