<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文字雲</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-cloud@1.2.7/build/d3.layout.cloud.min.js"></script>
  <style>
    :root {
      --bg:      #07192e;
      --bg2:     #0d2645;
      --panel:   #0a1f38;
      --accent:  #4a9eff;
      --accent2: #1a6fd4;
      --text:    #d0e8ff;
      --border:  #1a3a5c;
      --muted:   #4a7a9b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      font-family: 'Segoe UI', 'Microsoft JhengHei', Arial, sans-serif;
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 12px;
      background: rgba(10,31,56,.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; flex-wrap: wrap;
    }
    .topbar h1 {
      font-size: .95rem; color: #fff; font-weight: 700;
      letter-spacing: .04em; white-space: nowrap;
    }
    .topbar h1 span { color: var(--accent); }
    .sep { width: 1px; height: 24px; background: var(--border); margin: 0 1px; flex-shrink:0; }

    .btn {
      padding: 5px 11px; border-radius: 7px; border: none;
      cursor: pointer; font-size: .8rem; font-weight: 600;
      transition: all .15s; white-space: nowrap;
    }
    .btn-primary { background: var(--accent2); color: #fff; }
    .btn-primary:hover { background: #1558b0; }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: rgba(255,255,255,.07); }
    .btn-danger { background: #b33025; color: #fff; }
    .btn-danger:hover { background: #922419; }
    .btn-green { background: #1a7a4a; color: #fff; }
    .btn-green:hover { background: #155e39; }

    /* badge on 詞語 button */
    .btn-badge {
      display: inline-block;
      background: var(--accent);
      color: #fff; border-radius: 20px;
      font-size: .68rem; font-weight: 700;
      padding: 1px 5px; margin-left: 3px;
      vertical-align: middle; line-height: 1.4;
    }

    .ibtn {
      width: 30px; height: 30px; border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent; color: var(--text); cursor: pointer;
      font-size: .95rem; display: flex; align-items: center; justify-content: center;
      transition: background .12s; flex-shrink: 0;
    }
    .ibtn:hover { background: rgba(255,255,255,.08); }

    select.ctrl-select {
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border); border-radius: 7px;
      padding: 4px 8px; font-size: .8rem; cursor: pointer;
      max-width: 110px;
    }
    input[type="range"] { width: 72px; accent-color: var(--accent); cursor: pointer; }
    .label { font-size: .72rem; color: var(--muted); white-space: nowrap; }

    /* ── CLOUD STAGE（全螢幕）── */
    #cloudStage {
      flex: 1; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    #cloudStage::before {
      content: ''; position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 30% at 15% 20%, rgba(26,111,212,.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 25% at 80% 70%, rgba(74,158,255,.10) 0%, transparent 70%);
      pointer-events: none;
    }
    #cloudCanvas { width: 100%; height: 100%; position: relative; z-index: 1; }
    .word-count {
      position: absolute; bottom: 10px; left: 12px; z-index: 2;
      font-size: .7rem; color: var(--muted);
    }

    /* ── MODALS ── */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      display: none; align-items: center; justify-content: center;
      z-index: 999; backdrop-filter: blur(3px);
    }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 24px 20px;
      width: 340px;
      box-shadow: 0 24px 60px rgba(0,0,0,.6);
    }
    .modal h2 { font-size: 1rem; margin-bottom: 12px; color: #fff; }
    .modal input {
      width: 100%; padding: 9px 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 8px; color: #fff; font-size: .9rem;
      outline: none; margin-bottom: 9px; transition: border-color .15s;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
    .config-field { margin-bottom: 8px; }
    .config-field label { font-size: .73rem; color: var(--muted); display: block; margin-bottom: 3px; }
    .config-field input { margin-bottom: 0 !important; }

    /* QR modal */
    #qrModal .modal { text-align: center; }
    #qrcode-display { display: flex; justify-content: center; margin: 8px 0 10px; }
    .qr-url-text {
      font-size: .7rem; color: var(--muted);
      word-break: break-all; margin-bottom: 12px; text-align: center;
    }

    /* Word list modal */
    #wordListModal .modal { width: 360px; }
    #wordListItems {
      max-height: 280px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 4px;
      margin-bottom: 10px;
    }
    .word-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,.05); border-radius: 6px;
      padding: 5px 10px; font-size: .85rem;
    }
    .word-item .wt { color: var(--muted); font-size: .73rem; margin: 0 8px; }
    .word-item .del-w { cursor: pointer; color: #2a4a6a; font-size: .78rem; transition: color .12s; }
    .word-item .del-w:hover { color: #e55; }

    /* Share QR modal */
    #shareModal .modal { text-align: center; }
    #shareQrcode { display: flex; justify-content: center; margin-bottom: 8px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(10,31,56,.95); color: #d0e8ff;
      border: 1px solid var(--border);
      padding: 8px 18px; border-radius: 30px;
      font-size: .85rem; pointer-events: none; opacity: 0;
      transition: opacity .25s; z-index: 9999;
    }
    #toast.show { opacity: 1; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ══ TOP BAR ══ -->
<div class="topbar">
  <h1>☁ <span>文字雲</span></h1>
  <div class="sep"></div>

  <!-- Zoom -->
  <button class="ibtn" id="btnZoomIn"  title="放大">＋</button>
  <button class="ibtn" id="btnZoomOut" title="縮小">－</button>
  <button class="ibtn" id="btnZoomRst" title="重置">⊙</button>
  <div class="sep"></div>

  <!-- Scatter -->
  <button class="ibtn" id="btnGather"  title="聚集">◎</button>
  <button class="ibtn" id="btnScatter" title="散開">❋</button>
  <div class="sep"></div>

  <!-- Font size -->
  <span class="label">字級</span>
  <input type="range" id="fontRange" min="12" max="90" value="42" />
  <div class="sep"></div>

  <!-- 回答次數 -->
  <span class="label">次數</span>
  <select class="ctrl-select" id="maxVotesSelect">
    <option value="0">不限</option>
    <option value="1">1 次</option>
    <option value="2">2 次</option>
    <option value="3">3 次</option>
    <option value="5">5 次</option>
    <option value="10">10 次</option>
  </select>
  <div class="sep"></div>

  <!-- 配色 -->
  <span class="label">配色</span>
  <select class="ctrl-select" id="paletteSelect">
    <option value="0">⚪ 白藍系</option>
    <option value="1">🟡 暖金系</option>
    <option value="2">🟢 薄荷青</option>
    <option value="3">🔴 珊瑚紅</option>
    <option value="4">⬜ 灰白系</option>
  </select>
  <div class="sep"></div>

  <!-- 形狀 -->
  <span class="label">形狀</span>
  <select class="ctrl-select" id="shapeSelect">
    <option value="cloud">☁ 雲形</option>
    <option value="circle">● 圓形</option>
    <option value="square">■ 方形</option>
    <option value="diamond">◆ 菱形</option>
    <option value="heart">♥ 愛心</option>
    <option value="star">★ 星形</option>
  </select>
  <div class="sep"></div>

  <!-- Actions -->
  <button class="btn btn-ghost"   id="btnEdit">✏️ 主題</button>
  <button class="btn btn-green"   id="btnDownload">⬇️ 下載</button>
  <button class="btn btn-primary" id="btnShare">📤 分享</button>
  <button class="btn btn-danger"  id="btnNew">🔄 新增</button>
  <div class="sep"></div>

  <!-- QR + 詞語（靠右） -->
  <button class="btn btn-ghost" id="btnQR"       style="margin-left:auto">📱 QR Code</button>
  <button class="btn btn-ghost" id="btnWordList">📝 詞語<span class="btn-badge" id="wordBadge">0</span></button>
</div>

<!-- ══ CLOUD STAGE（滿版）══ -->
<div id="cloudStage">
  <svg id="cloudCanvas"></svg>
  <div class="word-count" id="wordCount"></div>
</div>

<!-- ══ MODALS ══ -->

<!-- 主題 + 手動加詞 -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h2>✏️ 編輯主題</h2>
    <label style="font-size:.78rem;color:var(--muted);display:block;margin-bottom:5px">主題文字（顯示於文字雲中心）</label>
    <input type="text" id="themeInput" placeholder="例：創意思考、班級活動…" maxlength="20" />
    <hr style="border-color:var(--border);margin:10px 0"/>
    <label style="font-size:.78rem;color:var(--muted);display:block;margin-bottom:5px">手動新增詞語</label>
    <input type="text" id="editInput" placeholder="輸入詞語，Enter 加入" maxlength="20" />
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">關閉</button>
      <button class="btn btn-primary" onclick="saveTheme()">套用主題</button>
    </div>
  </div>
</div>

<!-- QR Code 顯示 + 設定 -->
<div class="modal-bg" id="qrModal">
  <div class="modal" id="qrModal" style="width:300px;text-align:center">
    <h2>📱 QR Code</h2>
    <div id="qrcode-display"></div>
    <p class="qr-url-text" id="qrUrlText"></p>
    <div class="config-field" style="text-align:left">
      <label>留言頁網址</label>
      <input id="fb_inputUrl" placeholder="https://你的網域/input.html" />
    </div>
    <div class="modal-btns" style="justify-content:space-between">
      <button class="btn btn-ghost" onclick="closeModal('qrModal')">關閉</button>
      <button class="btn btn-primary" onclick="saveQRUrl()">更新網址</button>
    </div>
  </div>
</div>

<!-- 詞語列表 -->
<div class="modal-bg" id="wordListModal">
  <div class="modal" style="width:360px">
    <h2>📝 詞語列表</h2>
    <div id="wordListItems"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('wordListModal')">關閉</button>
    </div>
  </div>
</div>

<!-- 分享 QR -->
<div class="modal-bg" id="shareModal">
  <div class="modal" style="text-align:center;width:300px">
    <h2>📤 分享圖片</h2>
    <p style="font-size:.8rem;color:var(--muted);margin-bottom:12px">學生掃描後可儲存文字雲圖片</p>
    <div id="shareQrcode"></div>
    <p id="shareStatus" style="font-size:.7rem;color:var(--muted);word-break:break-all;margin:8px 0 12px"></p>
    <div class="modal-btns" style="justify-content:center">
      <button class="btn btn-ghost" onclick="closeModal('shareModal')">關閉</button>
    </div>
  </div>
</div>

<!-- 新文字雲確認 -->
<div class="modal-bg" id="newModal">
  <div class="modal">
    <h2>🔄 開新文字雲？</h2>
    <p style="color:var(--muted);font-size:.86rem;margin-bottom:14px">將清除所有詞語、主題與回答紀錄，無法復原。</p>
    <div class="modal-btns">
      <button class="btn btn-ghost"  onclick="closeModal('newModal')">取消</button>
      <button class="btn btn-danger" onclick="clearCloud()">確認清除</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- ══ SCRIPT ══ -->
<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, get, set }
                            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDCx6xPdDT4xMTHsfeU_0B_1b8-vUVM42I",
  authDomain:        "wordcloud-e0a71.firebaseapp.com",
  databaseURL:       "https://wordcloud-e0a71-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "wordcloud-e0a71",
  storageBucket:     "wordcloud-e0a71.firebasestorage.app",
  messagingSenderId: "825747699881",
  appId:             "1:825747699881:web:d47986c54e28135a56d1b8"
};
const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

// ── State ──────────────────────────────────────────────
let words        = {};
let currentTheme = localStorage.getItem("cloudTheme") || "";
let scale        = 1;
let scatterMode  = false;
let currentPalette = 0;
let currentShape   = "cloud";
let fontScale      = 42;

// ── Palettes ───────────────────────────────────────────
const PALETTES = [
  ["#ffffff","#c8e6ff","#90ccff","#5aadff","#2a8fff","#a8d8ff"],
  ["#fff9e6","#ffe066","#ffbb33","#ff8c00","#ffe4a0","#ffd166"],
  ["#e0fff8","#5ef0c8","#00c9a7","#00a896","#ffffff","#a0f0e0"],
  ["#fff","#ffb3ba","#ff6b6b","#ff4040","#ffd6d6","#ff8c8c"],
  ["#ffffff","#e8e8e8","#cccccc","#aaaaaa","#ffffff","#eeeeee"],
];

// ── Palette select ─────────────────────────────────────
const paletteSelect = document.getElementById("paletteSelect");
paletteSelect.addEventListener("change", () => {
  currentPalette = +paletteSelect.value;
  renderCloud();
});

// ── Shape select ───────────────────────────────────────
const shapeSelect = document.getElementById("shapeSelect");
shapeSelect.value = currentShape;
shapeSelect.addEventListener("change", () => {
  currentShape = shapeSelect.value;
  renderCloud();
});

// ── Firebase: words ────────────────────────────────────
onValue(ref(db, "words"), snap => {
  const raw = snap.val() || {};
  const agg = {};
  Object.values(raw).forEach(({text}) => {
    if (!text) return;
    const t = text.trim();
    agg[t] = (agg[t] || 0) + 1;
  });
  words = agg;
  renderCloud();
  updateWordBadge();
});

function updateWordBadge() {
  const count = Object.keys(words).length;
  document.getElementById("wordBadge").textContent = count;
  document.getElementById("wordCount").textContent = count ? `${count} 個詞` : "";
}

// ── Word list modal ────────────────────────────────────
document.getElementById("btnWordList").onclick = () => {
  renderWordListModal();
  openModal("wordListModal");
};

function renderWordListModal() {
  const el = document.getElementById("wordListItems");
  const entries = Object.entries(words).sort((a,b) => b[1]-a[1]);
  if (entries.length === 0) {
    el.innerHTML = '<p style="color:var(--muted);font-size:.82rem;text-align:center;padding:12px">尚無詞語</p>';
    return;
  }
  el.innerHTML = entries.map(([text, count]) => `
    <div class="word-item">
      <span>${text}</span>
      <span class="wt">${count} 次</span>
      <span class="del-w" data-text="${text}">✕</span>
    </div>
  `).join("");
  el.querySelectorAll(".del-w").forEach(btn => {
    btn.onclick = () => deleteWord(btn.dataset.text);
  });
}

async function deleteWord(text) {
  const snap = await get(ref(db, "words"));
  if (!snap.val()) return;
  const tasks = [];
  snap.forEach(child => {
    if (child.val().text === text)
      tasks.push(remove(ref(db, "words/" + child.key)));
  });
  await Promise.all(tasks);
  renderWordListModal();
}

window.addWordManual = async function() {
  const inp  = document.getElementById("editInput");
  const text = inp.value.trim();
  if (!text) return;
  await push(ref(db, "words"), { text, time: Date.now() });
  inp.value = ""; inp.focus();
  toast(`已加入「${text}」`);
};
document.getElementById("editInput").addEventListener("keydown", e => {
  if (e.key === "Enter") window.addWordManual();
});

// ── Clear ──────────────────────────────────────────────
window.clearCloud = async function() {
  await Promise.all([
    remove(ref(db, "words")),
    remove(ref(db, "voters")),
  ]);
  currentTheme = "";
  localStorage.removeItem("cloudTheme");
  closeModal("newModal");
  renderCloud();
  toast("已清除所有詞語、主題與回答紀錄");
};

// ── Theme ──────────────────────────────────────────────
window.saveTheme = function() {
  const val = document.getElementById("themeInput").value.trim();
  currentTheme = val;
  localStorage.setItem("cloudTheme", val);
  renderCloud();
  closeModal("editModal");
  toast(val ? `主題已設定為「${val}」` : "主題已清除");
};

// ── Cloud Render ───────────────────────────────────────
let renderTimer = null;
function renderCloud() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(_doRender, 120);
}

function _doRender() {
  const svg = document.getElementById("cloudCanvas");
  const W = svg.clientWidth  || 800;
  const H = svg.clientHeight || 600;
  const ns = "http://www.w3.org/2000/svg";
  const entries = Object.entries(words);
  const pal = PALETTES[currentPalette];

  if (entries.length === 0) {
    svg.innerHTML = "";
    if (currentTheme) {
      const t = document.createElementNS(ns, "text");
      t.setAttribute("x", W/2); t.setAttribute("y", H/2);
      t.setAttribute("text-anchor","middle"); t.setAttribute("dominant-baseline","middle");
      t.setAttribute("font-size", Math.min(W,H)*.1);
      t.setAttribute("font-weight","900");
      t.setAttribute("font-family","Segoe UI, Arial, sans-serif");
      t.setAttribute("fill", pal[0]); t.setAttribute("fill-opacity","0.15");
      t.setAttribute("letter-spacing","6");
      t.textContent = currentTheme.toUpperCase();
      svg.appendChild(t);
    } else {
      const t = document.createElementNS(ns, "text");
      t.setAttribute("x", W/2); t.setAttribute("y", H/2);
      t.setAttribute("text-anchor","middle"); t.setAttribute("dominant-baseline","middle");
      t.setAttribute("fill","#1a3a5c"); t.setAttribute("font-size","16");
      t.setAttribute("font-family","Segoe UI, sans-serif");
      t.textContent = "等待詞語加入…";
      svg.appendChild(t);
    }
    return;
  }

  const maxCnt = Math.max(...entries.map(e => e[1]));
  const minCnt = Math.min(...entries.map(e => e[1]));
  const sizeScale = d3.scaleLinear()
    .domain([minCnt, maxCnt])
    .range([fontScale * .38, fontScale]);

  d3.layout.cloud()
    .size([W, H])
    .words(entries.map(([text, count]) => ({ text, size: sizeScale(count) * scale })))
    .padding(scatterMode ? 20 : 4)
    .spiral(["square","diamond"].includes(currentShape) ? "rectangular" : "archimedean")
    .rotate(() => scatterMode ? (~~(Math.random()*3)-1)*30 : 0)
    .font("Segoe UI, Arial, sans-serif")
    .fontSize(d => d.size)
    .on("end", draw)
    .start();

  function draw(cloudWords) {
    svg.innerHTML = "";

    // glow bg
    const defs = document.createElementNS(ns,"defs");
    const rg = document.createElementNS(ns,"radialGradient");
    rg.id="cg"; rg.setAttribute("cx","50%"); rg.setAttribute("cy","50%"); rg.setAttribute("r","55%");
    const s1=document.createElementNS(ns,"stop"); s1.setAttribute("offset","0%");   s1.setAttribute("stop-color",pal[4]+"18");
    const s2=document.createElementNS(ns,"stop"); s2.setAttribute("offset","100%"); s2.setAttribute("stop-color","transparent");
    rg.appendChild(s1); rg.appendChild(s2); defs.appendChild(rg); svg.appendChild(defs);
    const gr=document.createElementNS(ns,"rect"); gr.setAttribute("width",W); gr.setAttribute("height",H); gr.setAttribute("fill","url(#cg)"); svg.appendChild(gr);

    const g = document.createElementNS(ns,"g");
    g.setAttribute("transform",`translate(${W/2},${H/2})`);

    // Theme watermark
    if (currentTheme) {
      const tg = document.createElementNS(ns,"text");
      tg.setAttribute("text-anchor","middle"); tg.setAttribute("dominant-baseline","middle");
      tg.setAttribute("font-size", Math.min(W,H)*.11);
      tg.setAttribute("font-weight","900");
      tg.setAttribute("font-family","Segoe UI, Arial, sans-serif");
      tg.setAttribute("fill","#ffffff"); tg.setAttribute("fill-opacity","0.13");
      tg.setAttribute("letter-spacing","4"); tg.setAttribute("y","0");
      tg.textContent = currentTheme.toUpperCase();
      g.appendChild(tg);
    }

    cloudWords.forEach((w,i) => {
      const t = document.createElementNS(ns,"text");
      t.setAttribute("text-anchor","middle");
      t.setAttribute("transform",`translate(${w.x},${w.y}) rotate(${w.rotate})`);
      t.setAttribute("font-size", w.size+"px");
      t.setAttribute("font-family", w.font);
      t.setAttribute("fill", pal[i%pal.length]);
      t.setAttribute("fill-opacity","0.9");
      t.style.cursor = "default"; t.style.transition = "fill-opacity .15s";
      t.addEventListener("mouseenter",()=>t.setAttribute("fill-opacity","1"));
      t.addEventListener("mouseleave",()=>t.setAttribute("fill-opacity","0.9"));
      t.textContent = w.text;
      g.appendChild(t);
    });

    svg.appendChild(g);
    g.style.opacity="0"; g.style.transition="opacity .35s";
    requestAnimationFrame(()=>{ g.style.opacity="1"; });
  }
}

// ── Controls ───────────────────────────────────────────
document.getElementById("btnZoomIn").onclick  = () => { scale=Math.min(scale+.15,3); renderCloud(); };
document.getElementById("btnZoomOut").onclick = () => { scale=Math.max(scale-.15,.3); renderCloud(); };
document.getElementById("btnZoomRst").onclick = () => { scale=1; renderCloud(); };
document.getElementById("btnGather").onclick  = () => { scatterMode=false; renderCloud(); };
document.getElementById("btnScatter").onclick = () => { scatterMode=true;  renderCloud(); };
document.getElementById("fontRange").oninput  = function() { fontScale=+this.value; renderCloud(); };
document.getElementById("btnEdit").onclick    = () => { document.getElementById("themeInput").value=currentTheme; openModal("editModal"); };
document.getElementById("btnNew").onclick     = () => openModal("newModal");

// ── Capture ────────────────────────────────────────────
async function captureCloud(fmt="jpeg", q=.85) {
  const canvas = await html2canvas(document.getElementById("cloudStage"), {
    backgroundColor: "#07192e", scale: 1, useCORS: true
  });
  return { canvas, dataUrl: canvas.toDataURL("image/"+fmt, q) };
}

// ── Download ───────────────────────────────────────────
document.getElementById("btnDownload").onclick = async () => {
  toast("產生圖片中…");
  const { dataUrl } = await captureCloud("png");
  const a = document.createElement("a");
  a.download = "wordcloud_"+Date.now()+".png"; a.href = dataUrl; a.click();
  toast("✅ 已下載！");
};

// ── Share ──────────────────────────────────────────────
document.getElementById("btnShare").onclick = async () => {
  toast("產生分享圖片中…");
  try {
    const { dataUrl } = await captureCloud("jpeg", .85);
    const snap = await push(ref(db,"shares"), { img: dataUrl, time: Date.now() });
    const base = (localStorage.getItem("inputPageUrl")||"").replace(/input\.html.*$/,"");
    const shareUrl = (base || location.origin+location.pathname.replace("index.html",""))
      + "share.html?id=" + snap.key;

    const qrEl = document.getElementById("shareQrcode");
    qrEl.innerHTML = "";
    new QRCode(qrEl, { text:shareUrl, width:200, height:200,
      colorDark:"#07192e", colorLight:"#ffffff", correctLevel:QRCode.CorrectLevel.M });
    document.getElementById("shareStatus").textContent = shareUrl;
    openModal("shareModal");
    toast("✅ QR Code 已產生！");
  } catch(e) {
    toast("分享失敗："+e.message, 3500);
  }
};

// ── QR Code 顯示 + 設定 ────────────────────────────────
window.refreshQR = function() {
  const qrEl   = document.getElementById("qrcode-display");
  const qrText = document.getElementById("qrUrlText");
  qrEl.innerHTML = "";
  const url = localStorage.getItem("inputPageUrl");
  if (!url) { qrText.textContent = "請填寫並更新留言頁網址"; return; }
  qrText.textContent = url;
  new QRCode(qrEl, { text:url, width:180, height:180,
    colorDark:"#07192e", colorLight:"#ffffff", correctLevel:QRCode.CorrectLevel.M });
};

document.getElementById("btnQR").onclick = () => {
  const s = localStorage.getItem("inputPageUrl");
  if (s) document.getElementById("fb_inputUrl").value = s;
  refreshQR();
  openModal("qrModal");
};

window.saveQRUrl = function() {
  const url = document.getElementById("fb_inputUrl").value.trim();
  if (!url) { toast("請填寫網址"); return; }
  localStorage.setItem("inputPageUrl", url);
  refreshQR();
  toast("✅ QR Code 已更新");
};

// ── 回答次數 ───────────────────────────────────────────
const maxVotesSelect = document.getElementById("maxVotesSelect");
onValue(ref(db,"settings/maxVotes"), snap => {
  maxVotesSelect.value = snap.exists() ? String(snap.val()) : "1";
});
maxVotesSelect.addEventListener("change", () => {
  set(ref(db,"settings/maxVotes"), Number(maxVotesSelect.value));
  toast(`已設定：每人最多 ${maxVotesSelect.options[maxVotesSelect.selectedIndex].text}`);
});

// ── Modal helpers ──────────────────────────────────────
window.openModal  = id => document.getElementById(id).style.display = "flex";
window.closeModal = id => document.getElementById(id).style.display = "none";
document.querySelectorAll(".modal-bg").forEach(bg => {
  bg.addEventListener("click", e => { if(e.target===bg) bg.style.display="none"; });
});

// ── Toast ──────────────────────────────────────────────
let toastTimer;
window.toast = function(msg, dur=2200) {
  const el = document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), dur);
};

// ── Init ───────────────────────────────────────────────
if (!localStorage.getItem("inputPageUrl"))
  localStorage.setItem("inputPageUrl","https://yingertw-arch.github.io/wordcloud/input.html");
get(ref(db,"settings/maxVotes")).then(s => { if(!s.exists()) set(ref(db,"settings/maxVotes"),0); });
renderCloud();
window.addEventListener("resize", () => renderCloud());

</script>
