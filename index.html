<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文字雲</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-cloud@1.2.7/build/d3.layout.cloud.min.js"></script>
  <style>
    :root {
      --bg:      #07192e;
      --bg2:     #0d2645;
      --panel:   #0a1f38;
      --accent:  #4a9eff;
      --accent2: #1a6fd4;
      --text:    #d0e8ff;
      --border:  #1a3a5c;
      --muted:   #4a7a9b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      font-family: 'Segoe UI', 'Microsoft JhengHei', Arial, sans-serif;
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px;
      background: rgba(10,31,56,.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; flex-wrap: wrap;
    }
    .topbar h1 {
      font-size: 1rem; color: #fff; font-weight: 700;
      letter-spacing: .04em; margin-right: 4px;
    }
    .topbar h1 span { color: var(--accent); }
    .sep { width: 1px; height: 26px; background: var(--border); margin: 0 2px; }

    .btn {
      padding: 6px 13px; border-radius: 7px; border: none;
      cursor: pointer; font-size: 0.82rem; font-weight: 600;
      transition: all .15s; white-space: nowrap;
    }
    .btn-primary { background: var(--accent2); color: #fff; }
    .btn-primary:hover { background: #1558b0; }
    .btn-ghost {
      background: transparent; color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.07); }
    .btn-danger { background: #b33025; color: #fff; }
    .btn-danger:hover { background: #922419; }
    .btn-green { background: #1a7a4a; color: #fff; }
    .btn-green:hover { background: #155e39; }

    .ibtn {
      width: 32px; height: 32px; border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent; color: var(--text); cursor: pointer;
      font-size: 1rem; display: flex; align-items: center; justify-content: center;
      transition: background .12s;
    }
    .ibtn:hover { background: rgba(255,255,255,.08); }

    input[type="range"] { width: 80px; accent-color: var(--accent); cursor: pointer; }
    .label { font-size: 0.75rem; color: var(--muted); }

    /* ── MAIN ── */
    .main { flex: 1; display: flex; overflow: hidden; }

    /* ── CLOUD STAGE ── */
    #cloudStage {
      flex: 1; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
    }
    /* Decorative background clouds */
    #cloudStage::before {
      content: '';
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 30% at 15% 20%, rgba(26,111,212,.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 25% at 80% 70%, rgba(74,158,255,.10) 0%, transparent 70%),
        radial-gradient(ellipse 40% 20% at 50% 50%, rgba(13,38,69,.4) 0%, transparent 80%);
      pointer-events: none;
    }
    #cloudCanvas { width: 100%; height: 100%; position: relative; z-index: 1; }
    .word-count {
      position: absolute; bottom: 10px; left: 14px; z-index: 2;
      font-size: 0.72rem; color: var(--muted);
    }

    /* ── RIGHT PANEL ── */
    .rpanel {
      width: 240px; background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0; overflow-y: auto;
    }
    .rpanel-section {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .rpanel-section h3 {
      font-size: 0.72rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .1em;
      margin-bottom: 9px;
    }

    /* QR */
    #qrWrap { display: flex; flex-direction: column; align-items: center; gap: 7px; }
    #qrcode canvas, #qrcode img { border-radius: 6px; }
    .qr-url {
      font-size: 0.68rem; color: var(--muted); text-align: center;
      word-break: break-all; max-width: 100%;
    }

    /* Palette */
    .palette { display: flex; flex-wrap: wrap; gap: 5px; }
    .pal-item {
      display: flex; gap: 2px; padding: 3px; border-radius: 5px;
      cursor: pointer; border: 2px solid transparent; transition: all .12s;
    }
    .pal-item:hover { border-color: rgba(255,255,255,.3); }
    .pal-item.active { border-color: var(--accent); }
    .pal-swatch { width: 13px; height: 20px; border-radius: 2px; }

    /* Shape */
    .shape-grid { display: flex; flex-wrap: wrap; gap: 5px; }
    .shape-btn {
      flex: 1; min-width: 55px; padding: 6px 3px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); cursor: pointer;
      font-size: 0.78rem; text-align: center; transition: all .12s;
    }
    .shape-btn:hover, .shape-btn.active {
      background: var(--accent2); border-color: var(--accent2); color: #fff;
    }

    /* Word list */
    #wordList { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
    .word-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,.04); border-radius: 5px;
      padding: 4px 9px; font-size: 0.82rem;
    }
    .word-item .wt { color: var(--muted); font-size: 0.72rem; }
    .word-item .del-w { cursor: pointer; color: #2a4a6a; font-size: 0.78rem; transition: color .12s; }
    .word-item .del-w:hover { color: #e55; }

    /* Modal */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      display: none; align-items: center; justify-content: center;
      z-index: 999; backdrop-filter: blur(3px);
    }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 26px 22px;
      width: 340px;
      box-shadow: 0 24px 60px rgba(0,0,0,.6);
    }
    .modal h2 { font-size: 1.05rem; margin-bottom: 14px; color: #fff; }
    .modal input {
      width: 100%; padding: 10px 13px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 8px; color: #fff; font-size: 0.95rem;
      outline: none; margin-bottom: 10px;
      transition: border-color .15s;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

    .config-field { margin-bottom: 8px; }
    .config-field label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 3px; }
    .config-field input { margin-bottom: 0 !important; }

    /* Toast */
    #toast {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      background: rgba(10,31,56,.95); color: #d0e8ff;
      border: 1px solid var(--border);
      padding: 9px 20px; border-radius: 30px;
      font-size: 0.88rem; pointer-events: none; opacity: 0;
      transition: opacity .25s; z-index: 9999;
    }
    #toast.show { opacity: 1; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Theme badge in cloud */
    .theme-badge {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 2;
      color: rgba(255,255,255,.08);
      font-size: 3rem; font-weight: 900;
      letter-spacing: .08em; text-align: center;
      white-space: nowrap; text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- ══ TOP BAR ══ -->
<div class="topbar">
  <h1>☁ <span>文字雲</span></h1>
  <div class="sep"></div>

  <span class="label">縮放</span>
  <button class="ibtn" id="btnZoomIn"  title="放大">＋</button>
  <button class="ibtn" id="btnZoomOut" title="縮小">－</button>
  <button class="ibtn" id="btnZoomRst" title="重置">⊙</button>
  <div class="sep"></div>

  <button class="ibtn" id="btnGather"  title="聚集">◎</button>
  <button class="ibtn" id="btnScatter" title="散開">❋</button>
  <div class="sep"></div>

  <span class="label">字級</span>
  <input type="range" id="fontRange" min="12" max="90" value="42" />
  <div class="sep"></div>

  <button class="btn btn-ghost"    id="btnEdit">✏️ 編輯主題</button>
  <button class="btn btn-green"    id="btnDownload">⬇️ 下載</button>
  <button class="btn btn-primary"  id="btnShare">📤 分享圖片</button>
  <button class="btn btn-danger"   id="btnNew">🔄 新文字雲</button>
  <button class="btn btn-ghost"    id="btnFirebase" style="margin-left:auto">📱 QR 設定</button>
</div>

<!-- ══ MAIN ══ -->
<div class="main">
  <div id="cloudStage">
    <svg id="cloudCanvas"></svg>
    <div class="word-count" id="wordCount">0 個詞</div>
  </div>

  <div class="rpanel">
    <!-- QR -->
    <div class="rpanel-section">
      <h3>📱 掃碼留言</h3>
      <div id="qrWrap">
        <div id="qrcode"></div>
        <p class="qr-url" id="qrUrl">尚未設定網址</p>
        <button class="btn btn-ghost" style="font-size:.75rem;padding:4px 10px" onclick="refreshQR()">重新產生</button>
      </div>
    </div>

    <!-- Color -->
    <div class="rpanel-section">
      <h3>🎨 配色</h3>
      <div class="palette" id="palette"></div>
    </div>

    <!-- Shape -->
    <div class="rpanel-section">
      <h3>🔷 形狀</h3>
      <div class="shape-grid" id="shapeGrid"></div>
    </div>

    <!-- Words -->
    <div class="rpanel-section" style="flex:1">
      <h3>📝 詞語列表</h3>
      <div id="wordList"></div>
    </div>
  </div>
</div>

<!-- ══ MODALS ══ -->

<!-- Theme edit modal -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h2>✏️ 編輯主題</h2>
    <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:6px">主題文字（顯示於文字雲中心）</label>
    <input type="text" id="themeInput" placeholder="例：創意思考、班級活動…" maxlength="20" />
    <hr style="border-color:var(--border);margin:12px 0"/>
    <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:6px">手動新增詞語</label>
    <input type="text" id="editInput" placeholder="輸入詞語，Enter 加入" maxlength="20" />
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">關閉</button>
      <button class="btn btn-primary" onclick="saveTheme()">套用主題</button>
    </div>
  </div>
</div>

<!-- QR URL modal -->
<div class="modal-bg" id="firebaseModal">
  <div class="modal" style="width:380px">
    <h2>📱 QR Code 網址設定</h2>
    <div class="config-field">
      <label>留言頁網址</label>
      <input id="fb_inputUrl" placeholder="https://你的網域/input.html" />
    </div>
    <p style="font-size:.75rem;color:var(--muted);margin-top:4px">掃描 QR Code 後開啟的頁面網址</p>
    <div class="modal-btns" style="margin-top:14px">
      <button class="btn btn-ghost" onclick="closeModal('firebaseModal')">取消</button>
      <button class="btn btn-primary" onclick="saveQRUrl()">儲存</button>
    </div>
  </div>
</div>

<!-- New cloud confirm -->
<div class="modal-bg" id="newModal">
  <div class="modal">
    <h2>🔄 開新文字雲？</h2>
    <p style="color:var(--muted);font-size:.88rem;margin-bottom:14px">這將清除所有詞語及主題，無法復原。</p>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('newModal')">取消</button>
      <button class="btn btn-danger" onclick="clearCloud()">確認清除</button>
    </div>
  </div>
</div>

<!-- Share QR modal -->
<div class="modal-bg" id="shareModal">
  <div class="modal" style="text-align:center;width:320px">
    <h2>📤 分享圖片</h2>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:14px">學生掃描 QR Code 即可查看並儲存文字雲圖片</p>
    <div id="shareQrcode" style="display:flex;justify-content:center;margin-bottom:10px"></div>
    <p id="shareStatus" style="font-size:.78rem;color:var(--muted);word-break:break-all;margin-bottom:14px"></p>
    <div class="modal-btns" style="justify-content:center">
      <button class="btn btn-ghost" onclick="closeModal('shareModal')">關閉</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- ══ SCRIPT ══ -->
<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, get }
                            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase ───────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDCx6xPdDT4xMTHsfeU_0B_1b8-vUVM42I",
  authDomain:        "wordcloud-e0a71.firebaseapp.com",
  databaseURL:       "https://wordcloud-e0a71-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "wordcloud-e0a71",
  storageBucket:     "wordcloud-e0a71.firebasestorage.app",
  messagingSenderId: "825747699881",
  appId:             "1:825747699881:web:d47986c54e28135a56d1b8"
};

const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

// ── State ──────────────────────────────────────────────
let words        = {};
let currentTheme = localStorage.getItem("cloudTheme") || "";
let scale        = 1;
let scatterMode  = false;
let currentPalette = 0;
let currentShape   = "cloud";
let fontScale      = 42;

// ── Palettes ───────────────────────────────────────────
const PALETTES = [
  // Corporate white/blue (default)
  ["#ffffff","#c8e6ff","#90ccff","#5aadff","#2a8fff","#a8d8ff"],
  // Warm gold
  ["#fff9e6","#ffe066","#ffbb33","#ff8c00","#ffe4a0","#ffd166"],
  // Teal / mint
  ["#e0fff8","#5ef0c8","#00c9a7","#00a896","#ffffff","#a0f0e0"],
  // Coral / warm
  ["#fff","#ffb3ba","#ff6b6b","#ff4040","#ffd6d6","#ff8c8c"],
  // Monochrome white
  ["#ffffff","#e8e8e8","#cccccc","#aaaaaa","#ffffff","#eeeeee"],
];
const SHAPES       = ["circle","square","diamond","heart","star","cloud"];
const SHAPE_LABELS = { circle:"● 圓形", square:"■ 方形", diamond:"◆ 菱形", heart:"♥ 愛心", star:"★ 星形", cloud:"☁ 雲形" };

// ── Palette UI ─────────────────────────────────────────
const palEl = document.getElementById("palette");
PALETTES.forEach((pal, idx) => {
  const wrap = document.createElement("div");
  wrap.className = "pal-item" + (idx === 0 ? " active" : "");
  wrap.dataset.idx = idx;
  pal.slice(0,5).forEach(c => {
    const s = document.createElement("div");
    s.className = "pal-swatch";
    s.style.background = c;
    wrap.appendChild(s);
  });
  wrap.onclick = () => {
    document.querySelectorAll(".pal-item").forEach(w => w.classList.remove("active"));
    wrap.classList.add("active");
    currentPalette = idx;
    renderCloud();
  };
  palEl.appendChild(wrap);
});

// ── Shape UI ───────────────────────────────────────────
const shapeEl = document.getElementById("shapeGrid");
SHAPES.forEach(s => {
  const btn = document.createElement("button");
  btn.className = "shape-btn" + (s === currentShape ? " active" : "");
  btn.textContent = SHAPE_LABELS[s];
  btn.onclick = () => {
    document.querySelectorAll(".shape-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentShape = s;
    renderCloud();
  };
  shapeEl.appendChild(btn);
});

// ── Firebase listener ──────────────────────────────────
onValue(ref(db, "words"), snap => {
  const raw = snap.val() || {};
  const agg = {};
  Object.values(raw).forEach(({text}) => {
    if (!text) return;
    const t = text.trim();
    agg[t] = (agg[t] || 0) + 1;
  });
  words = agg;
  renderCloud();
  renderWordList();
});

// ── Word list ──────────────────────────────────────────
function renderWordList() {
  const el = document.getElementById("wordList");
  const entries = Object.entries(words).sort((a,b) => b[1]-a[1]);
  document.getElementById("wordCount").textContent = `${entries.length} 個詞`;
  if (entries.length === 0) {
    el.innerHTML = '<p style="color:#2a4a6a;font-size:.8rem;text-align:center;padding:10px">尚無詞語</p>';
    return;
  }
  el.innerHTML = entries.map(([text, count]) => `
    <div class="word-item">
      <span>${text}</span>
      <span class="wt">${count}次</span>
      <span class="del-w" data-text="${text}">✕</span>
    </div>
  `).join("");
  el.querySelectorAll(".del-w").forEach(btn => {
    btn.onclick = () => deleteWord(btn.dataset.text);
  });
}

async function deleteWord(text) {
  const snap = await get(ref(db, "words"));
  if (!snap.val()) return;
  const tasks = [];
  snap.forEach(child => {
    if (child.val().text === text)
      tasks.push(remove(ref(db, "words/" + child.key)));
  });
  await Promise.all(tasks);
}

window.addWordManual = async function() {
  const inp  = document.getElementById("editInput");
  const text = inp.value.trim();
  if (!text) return;
  await push(ref(db, "words"), { text, time: Date.now() });
  inp.value = "";
  inp.focus();
  toast(`已加入「${text}」`);
};
document.getElementById("editInput").addEventListener("keydown", e => {
  if (e.key === "Enter") window.addWordManual();
});

window.clearCloud = async function() {
  await remove(ref(db, "words"));
  currentTheme = "";
  localStorage.removeItem("cloudTheme");
  closeModal("newModal");
  renderCloud();
  toast("已清除所有詞語與主題");
};

// ── Theme ──────────────────────────────────────────────
window.saveTheme = function() {
  const val = document.getElementById("themeInput").value.trim();
  currentTheme = val;
  localStorage.setItem("cloudTheme", val);
  renderCloud();
  closeModal("editModal");
  toast(val ? `主題已設定為「${val}」` : "主題已清除");
};

// ── Cloud Render ───────────────────────────────────────
let renderTimer = null;
function renderCloud() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(_doRender, 120);
}

function _doRender() {
  const svg = document.getElementById("cloudCanvas");
  const W = svg.clientWidth  || 800;
  const H = svg.clientHeight || 600;
  const ns = "http://www.w3.org/2000/svg";

  const entries = Object.entries(words);
  const pal = PALETTES[currentPalette];

  if (entries.length === 0) {
    svg.innerHTML = "";
    // Draw theme if set
    if (currentTheme) {
      const t = document.createElementNS(ns, "text");
      t.setAttribute("x", W/2); t.setAttribute("y", H/2);
      t.setAttribute("text-anchor","middle"); t.setAttribute("dominant-baseline","middle");
      t.setAttribute("font-size","52"); t.setAttribute("font-weight","900");
      t.setAttribute("font-family","Segoe UI, Arial, sans-serif");
      t.setAttribute("fill", pal[0]); t.setAttribute("fill-opacity","0.18");
      t.setAttribute("letter-spacing","6");
      t.textContent = currentTheme.toUpperCase();
      svg.appendChild(t);
    } else {
      const t = document.createElementNS(ns, "text");
      t.setAttribute("x", W/2); t.setAttribute("y", H/2);
      t.setAttribute("text-anchor","middle");
      t.setAttribute("fill","#1a3a5c"); t.setAttribute("font-size","16");
      t.setAttribute("font-family","Segoe UI, sans-serif");
      t.textContent = "等待詞語加入…";
      svg.appendChild(t);
    }
    return;
  }

  const maxCnt = Math.max(...entries.map(e => e[1]));
  const minCnt = Math.min(...entries.map(e => e[1]));
  const sizeScale = d3.scaleLinear()
    .domain([minCnt, maxCnt])
    .range([fontScale * 0.38, fontScale]);

  const layout = d3.layout.cloud()
    .size([W, H])
    .words(entries.map(([text, count]) => ({
      text, size: sizeScale(count) * scale
    })))
    .padding(scatterMode ? 20 : 4)
    .spiral(["square","diamond"].includes(currentShape) ? "rectangular" : "archimedean")
    .rotate(() => scatterMode ? (~~(Math.random()*3)-1)*30 : 0)
    .font("Segoe UI, Arial, sans-serif")
    .fontSize(d => d.size)
    .on("end", draw);

  layout.start();

  function draw(cloudWords) {
    svg.innerHTML = "";

    // Background radial glow
    const defs = document.createElementNS(ns, "defs");
    const rg = document.createElementNS(ns, "radialGradient");
    rg.id = "cGlow"; rg.setAttribute("cx","50%"); rg.setAttribute("cy","50%"); rg.setAttribute("r","55%");
    const cs1 = document.createElementNS(ns,"stop"); cs1.setAttribute("offset","0%");   cs1.setAttribute("stop-color", pal[4]+"18");
    const cs2 = document.createElementNS(ns,"stop"); cs2.setAttribute("offset","100%"); cs2.setAttribute("stop-color","transparent");
    rg.appendChild(cs1); rg.appendChild(cs2); defs.appendChild(rg);
    svg.appendChild(defs);
    const glowRect = document.createElementNS(ns,"rect");
    glowRect.setAttribute("width",W); glowRect.setAttribute("height",H);
    glowRect.setAttribute("fill","url(#cGlow)");
    svg.appendChild(glowRect);

    const g = document.createElementNS(ns, "g");
    g.setAttribute("transform", `translate(${W/2},${H/2})`);

    // Theme text at center (watermark behind words)
    if (currentTheme) {
      const themeSize = Math.min(W, H) * 0.11;
      const tg = document.createElementNS(ns, "text");
      tg.setAttribute("text-anchor","middle");
      tg.setAttribute("dominant-baseline","middle");
      tg.setAttribute("font-size", themeSize);
      tg.setAttribute("font-weight","900");
      tg.setAttribute("font-family","Segoe UI, Arial, sans-serif");
      tg.setAttribute("fill", "#ffffff");
      tg.setAttribute("fill-opacity","0.13");
      tg.setAttribute("letter-spacing","4");
      tg.setAttribute("y","0");
      tg.textContent = currentTheme.toUpperCase();
      g.appendChild(tg);
    }

    // Words
    cloudWords.forEach((w, i) => {
      const text = document.createElementNS(ns, "text");
      text.setAttribute("text-anchor","middle");
      text.setAttribute("transform", `translate(${w.x},${w.y}) rotate(${w.rotate})`);
      text.setAttribute("font-size", w.size + "px");
      text.setAttribute("font-family", w.font);
      text.setAttribute("fill", pal[i % pal.length]);
      text.setAttribute("fill-opacity","0.9");
      text.style.cursor = "default";
      text.style.transition = "fill-opacity .15s";
      text.addEventListener("mouseenter", () => text.setAttribute("fill-opacity","1"));
      text.addEventListener("mouseleave", () => text.setAttribute("fill-opacity","0.9"));
      text.textContent = w.text;
      g.appendChild(text);
    });

    svg.appendChild(g);
    g.style.opacity = "0"; g.style.transition = "opacity .35s";
    requestAnimationFrame(() => { g.style.opacity = "1"; });
  }
}

// ── Controls ───────────────────────────────────────────
document.getElementById("btnZoomIn").onclick  = () => { scale = Math.min(scale+.15, 3); renderCloud(); };
document.getElementById("btnZoomOut").onclick = () => { scale = Math.max(scale-.15, .3); renderCloud(); };
document.getElementById("btnZoomRst").onclick = () => { scale = 1; renderCloud(); };
document.getElementById("btnGather").onclick  = () => { scatterMode=false; renderCloud(); };
document.getElementById("btnScatter").onclick = () => { scatterMode=true;  renderCloud(); };
document.getElementById("fontRange").oninput  = function() { fontScale=+this.value; renderCloud(); };

// ── Capture ────────────────────────────────────────────
async function captureCloud(format = "jpeg", quality = 0.85) {
  const stage = document.getElementById("cloudStage");
  const canvas = await html2canvas(stage, {
    backgroundColor: "#07192e",
    scale: 1,
    useCORS: true
  });
  return { canvas, dataUrl: canvas.toDataURL("image/" + format, quality) };
}

// ── Download ───────────────────────────────────────────
document.getElementById("btnDownload").onclick = async () => {
  toast("產生圖片中…");
  const { dataUrl } = await captureCloud("png");
  const a = document.createElement("a");
  a.download = "wordcloud_" + Date.now() + ".png";
  a.href = dataUrl;
  a.click();
  toast("✅ 已下載！");
};

// ── Share：截圖 → Firebase → QR Code ──────────────────
document.getElementById("btnShare").onclick = async () => {
  toast("產生分享圖片中…");
  try {
    const { dataUrl } = await captureCloud("jpeg", 0.85);

    // Push base64 image to Firebase shares node
    const sharesRef = ref(db, "shares");
    const snap = await push(sharesRef, { img: dataUrl, time: Date.now() });
    const shareId  = snap.key;

    // Derive share URL from inputPageUrl base
    const base = (localStorage.getItem("inputPageUrl") || "")
      .replace(/input\.html.*$/, "");
    const shareUrl = (base || (location.origin + location.pathname.replace("index.html","")))
      + "share.html?id=" + shareId;

    // Show QR modal
    const qrEl = document.getElementById("shareQrcode");
    qrEl.innerHTML = "";
    new QRCode(qrEl, {
      text: shareUrl, width: 200, height: 200,
      colorDark: "#07192e", colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
    document.getElementById("shareStatus").textContent = shareUrl;
    openModal("shareModal");
    toast("✅ QR Code 已產生！");
  } catch(e) {
    toast("分享失敗：" + e.message, 3500);
    console.error(e);
  }
};

// ── Edit modal ─────────────────────────────────────────
document.getElementById("btnEdit").onclick = () => {
  document.getElementById("themeInput").value = currentTheme;
  openModal("editModal");
};

// ── New ────────────────────────────────────────────────
document.getElementById("btnNew").onclick = () => openModal("newModal");

// ── QR Code ────────────────────────────────────────────
window.refreshQR = function() {
  const qrEl   = document.getElementById("qrcode");
  const qrText = document.getElementById("qrUrl");
  qrEl.innerHTML = "";
  const savedUrl = localStorage.getItem("inputPageUrl");
  if (!savedUrl) {
    qrText.textContent = "請設定留言頁網址";
    return;
  }
  qrText.textContent = savedUrl;
  new QRCode(qrEl, {
    text: savedUrl, width: 150, height: 150,
    colorDark: "#07192e", colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });
};

// ── QR URL Modal ───────────────────────────────────────
document.getElementById("btnFirebase").onclick = () => {
  const s = localStorage.getItem("inputPageUrl");
  if (s) document.getElementById("fb_inputUrl").value = s;
  openModal("firebaseModal");
};
window.saveQRUrl = function() {
  const url = document.getElementById("fb_inputUrl").value.trim();
  if (!url) { toast("請填寫網址"); return; }
  localStorage.setItem("inputPageUrl", url);
  refreshQR();
  closeModal("firebaseModal");
  toast("✅ QR Code 已更新");
};

// ── Modal helpers ──────────────────────────────────────
window.openModal  = id => document.getElementById(id).style.display = "flex";
window.closeModal = id => document.getElementById(id).style.display = "none";
document.querySelectorAll(".modal-bg").forEach(bg => {
  bg.addEventListener("click", e => { if (e.target===bg) bg.style.display="none"; });
});

// ── Toast ──────────────────────────────────────────────
let toastTimer;
window.toast = function(msg, dur=2200) {
  const el = document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), dur);
};

// ── Init ───────────────────────────────────────────────
if (!localStorage.getItem("inputPageUrl")) {
  localStorage.setItem("inputPageUrl","https://yingertw-arch.github.io/wordcloud/input.html");
}
refreshQR();
renderCloud();
window.addEventListener("resize", () => renderCloud());

</script>
